name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apifold/transformer build
      - run: pnpm --filter @apifold/cli build
      - run: pnpm --filter @apifold/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: apifold-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: apifold-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: apifold-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: apifold-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: apifold-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apifold/transformer build
      - run: pnpm --filter @apifold/cli build
      - name: Compile standalone binary
        run: bun build apps/cli/dist/index.js --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    needs: [publish-npm, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/cli/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apifold-cli:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/apifold-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
