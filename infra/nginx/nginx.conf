events {
    worker_connections 1024;
}

http {
    # Do not emit nginx version in Server header or error pages
    server_tokens off;

    # Rate limiting zones
    # General zone: 20 req/s per IP (burst up to 40)
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # Stricter zone for SSE/runtime: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=runtime:10m rate=5r/s;

    upstream web {
        server web:3000;
    }

    upstream runtime {
        server runtime:3001;
    }

    # Shared security headers added to all proxied responses
    map $upstream_addr $security_headers_applied {
        default 1;
    }

    server {
        listen 80;

        # Apply general rate limit; allow brief bursts
        limit_req zone=general burst=40 nodelay;
        limit_req_status 429;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # NOTE: Add HSTS only after TLS is configured:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent response header injection from upstream
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        location /api/runtime/ {
            # Stricter rate limit for SSE endpoint
            limit_req zone=runtime burst=10 nodelay;

            proxy_pass http://runtime/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent response header injection from upstream
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
